<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Golden Circuit Traces -->
  <g stroke="#A68A42" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top section -->
    <path d="M100 30 v25" />
    <circle cx="100" cy="30" r="2.5" fill="#A68A42"/>
    
    <path d="M90 35 v15 l10 10" />
    <circle cx="90" cy="35" r="2.5" fill="#A68A42"/>
    
    <path d="M110 35 v15 l-10 10" />
    <circle cx="110" cy="35" r="2.5" fill="#A68A42"/>

    <path d="M75 45 l10 10 v15" />
    <circle cx="75" cy="45" r="2.5" fill="#A68A42"/>

    <path d="M125 45 l-10 10 v15" />
    <circle cx="125" cy="45" r="2.5" fill="#A68A42"/>

    <!-- Left side radiating -->
    <path d="M45 65 l15 0 l15 15 v10" />
    <circle cx="45" cy="65" r="2.5" fill="#A68A42"/>
    
    <path d="M35 85 l20 0 l15 15" />
    <circle cx="35" cy="85" r="2.5" fill="#A68A42"/>
    
    <!-- Right side radiating -->
    <path d="M155 65 l-15 0 l-15 15 v10" />
    <circle cx="155" cy="65" r="2.5" fill="#A68A42"/>
    
    <path d="M165 85 l-20 0 l-15 15" />
    <circle cx="165" cy="85" r="2.5" fill="#A68A42"/>

    <!-- Horizontal bus lines (behind leaves) -->
    <path d="M20 100 h160" stroke="#1A3B28" stroke-width="1" />
    <path d="M20 105 h160" stroke="#1A3B28" stroke-width="1" />
    <path d="M20 110 h160" stroke="#1A3B28" stroke-width="1" />
    <path d="M25 115 h150" stroke="#1A3B28" stroke-width="1" />
    <path d="M30 120 h140" stroke="#1A3B28" stroke-width="1" />

    <!-- Bottom section -->
    <path d="M80 140 l10 10 v10" />
    <circle cx="80" cy="140" r="2.5" fill="#A68A42"/>
    
    <path d="M120 140 l-10 10 v10" />
    <circle cx="120" cy="140" r="2.5" fill="#A68A42"/>

    <path d="M90 150 v15" />
    <circle cx="90" cy="165" r="2.5" fill="#A68A42"/>

    <path d="M110 150 v15" />
    <circle cx="110" cy="165" r="2.5" fill="#A68A42"/>

    <path d="M100 155 v15" />
    <circle cx="100" cy="170" r="2.5" fill="#A68A42"/>
  </g>

  <!-- Dark Green Leaves -->
  <g fill="#0F3820">
    <!-- Center leaf -->
    <path d="M100 55 C 85 75, 92 95, 100 100 C 108 95, 115 75, 100 55 Z" />
    
    <!-- Left small leaf -->
    <path d="M85 85 C 75 90, 80 100, 95 105 C 95 95, 90 85, 85 85 Z" />
    
    <!-- Right small leaf -->
    <path d="M115 85 C 125 90, 120 100, 105 105 C 105 95, 110 85, 115 85 Z" />
    
    <!-- Left sweeping leaf -->
    <path d="M98 108 C 70 108, 45 100, 50 105 C 60 115, 80 115, 98 112 Z" />
    
    <!-- Right sweeping leaf -->
    <path d="M102 108 C 130 108, 155 100, 150 105 C 140 115, 120 115, 102 112 Z" />
    
    <!-- Stem -->
    <path d="M98 100 h4 v30 h-4 z" />
    <path d="M100 130 l-2 -10 h4 z" />
  </g>
</svg>
